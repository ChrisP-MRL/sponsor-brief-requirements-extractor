name: extract-requirements
description: Extract functional requirements from text files and populate them into an Excel template using pattern matching and NLP techniques.

when_to_use: |
  Use when the user wants to:
  - Extract functional requirements from text documents, notes, or specifications
  - Convert informal requirement descriptions into structured format
  - Generate a Functional Requirements Specification (FRS) Excel document
  - Identify and categorize requirements (e.g., must/should/could, user stories)
  - Populate requirements into the standard PRJ-Functional Requirements Specification template

instructions: |
  You will use the functional_requirement.py script to extract requirements from text files.

  ## Process

  1. **Identify the input file**: Ask the user which text file contains the requirements to extract.
     The file should contain requirement-like statements with keywords such as:
     - "must", "should", "shall", "will"
     - User stories format: "As a... I want... So that..."
     - Numbered or bulleted lists describing functionality

  2. **Check for template**: The script expects the Excel template at:
     `.claude/skills/code-review/templates/PRJ-Functional Requirements Specification.xlsx`
     Verify this file exists before running the script.

  3. **Run the extraction**: Execute the Python script:
     ```bash
     python .claude/skills/scripts/functional_requirement.py <input_file> [project_name]
     ```

     Where:
     - `<input_file>`: Path to the text file containing requirements
     - `[project_name]`: Optional project name (defaults to input filename)

  4. **Review results**: The script will:
     - Extract requirements using pattern matching
     - Categorize them (Authentication, Data Management, UI, Integration, etc.)
     - Assign priority (High/Medium/Low) based on keywords
     - Generate a timestamped Excel file in the `requirements/` directory
     - Output file format: `FRS_{project_name}_{timestamp}.xlsx`

  5. **Verify output**: Check the generated Excel file and report:
     - Number of requirements found
     - Output file location
     - Any warnings if no requirements were detected

  ## Requirement Detection Patterns

  The script looks for:
  - Explicit requirement keywords: "must allow", "shall provide", "should enable"
  - System/user statements: "The system must...", "User should..."
  - User stories: "As a user I want to..."
  - Numbered/bulleted lists with requirement keywords

  ## Categories Detected

  - Authentication (login, passwords, user accounts)
  - Data Management (database, storage, CRUD operations)
  - User Interface (UI, displays, forms, buttons)
  - Integration (APIs, third-party systems)
  - Reporting (dashboards, analytics, exports)
  - Security (encryption, authorization, access control)
  - Performance (speed, scalability, response time)
  - Notification (alerts, emails, messages)
  - General (uncategorized)

  ## Troubleshooting

  - If no requirements found: Check that the input file contains requirement-like language
  - If template not found: Verify the Excel template path is correct
  - If encoding errors: The script attempts UTF-8 first, then falls back to latin-1

  ## Example Usage

  ```bash
  # Extract from a text file with auto-detected project name
  python .claude/skills/scripts/functional_requirement.py requirements.txt

  # Extract with specific project name
  python .claude/skills/scripts/functional_requirement.py specs.txt "CRM System"
  ```

dependencies:
  - Python 3.x with openpyxl library installed
  - Excel template file: PRJ-Functional Requirements Specification.xlsx
  - Write permissions for requirements/ output directory
